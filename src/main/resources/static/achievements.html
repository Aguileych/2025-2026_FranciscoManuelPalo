<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MINESWEEPER</title>
    <link rel="icon" type="image/png" href="./img/mine.png" />
    <link
      id="theme-stylesheet"
      rel="stylesheet"
      href="./css/theme-classic.css"
    />
  </head>
  <body>
    <header>
      <div class="dropdown-container">
        <div
          class="menu-btn retro-bevel"
          onclick="toggleDropdown('menuDropdown')"
        >
          <div class="hamburger-icon">
            <div class="hamburger-line"></div>
            <div class="hamburger-line"></div>
            <div class="hamburger-line"></div>
          </div>
          <span class="menu-text">Menu</span>
        </div>
        <div id="menuDropdown" class="dropdown-content menu-dropdown">
          <div class="menu-option retro-bevel">
            <a href="minesweeper.html" data-i18n="menu.game">Game</a>
          </div>
          <div class="menu-option retro-bevel">
            <a href="achievements.html" data-i18n="menu.achievements"
              >Achievements</a
            >
          </div>
          <div class="menu-option retro-bevel">
            <a href="usuario.html" data-i18n="menu.user">User</a>
          </div>
          <div class="menu-option retro-bevel">
            <a href="shop.html" data-i18n="menu.shop">Shop</a>
          </div>
          <div class="menu-option retro-bevel">
            <a href="historial.html" data-i18n="menu.history">History</a>
          </div>
        </div>
      </div>

      <div class="title-section">
        <h1>MINESWEEPER</h1>
        <img src="img/mine.png" alt="" />
      </div>

      <div class="header-right">
        <div
          class="header-btn retro-bevel"
          onclick="
            cambiarIdioma();
            cargarLogros();
          "
        >
          <img src="img/unionjack.webp" alt="" id="langFlag" />
          <span class="btn-text" id="langText" data-i18n="header.language"
            >English</span
          >
        </div>

        <div class="dropdown-container">
          <div
            class="header-btn retro-bevel"
            onclick="toggleDropdown('loginDropdown')"
          >
            <img src="img/face.webp" alt="" />
            <span id="loginBtnText" class="btn-text" data-i18n="header.login"
              >Login</span
            >
          </div>
          <div id="loginDropdown" class="dropdown-content login-dropdown">
            <div class="login-form active" id="loginForm">
              <h3
                style="text-align: center; margin-bottom: 15px; font-size: 14px"
                data-i18n="auth.loginTitle"
              >
                LOGIN
              </h3>
              <input
                type="email"
                id="loginEmail"
                class="form-input retro-bevel-inset"
                data-i18n-placeholder="auth.emailPlaceholder"
                placeholder="Email"
              />
              <input
                type="password"
                id="loginPassword"
                class="form-input retro-bevel-inset"
                data-i18n-placeholder="auth.passwordPlaceholder"
                placeholder="Password"
              />
              <p
                id="loginError"
                style="color: red; font-size: 12px; display: none"
              ></p>
              <button
                class="form-button retro-bevel"
                onclick="login()"
                data-i18n="auth.loginBtn"
              >
                Log in
              </button>
              <button
                class="switch-form-btn"
                onclick="switchForm('register')"
                data-i18n="auth.signupLink"
              >
                Sign up
              </button>
            </div>

            <div class="register-form" id="registerForm">
              <h3
                style="text-align: center; margin-bottom: 15px; font-size: 14px"
                data-i18n="auth.registerTitle"
              >
                Sign in
              </h3>
              <input
                type="email"
                id="regEmail"
                class="form-input retro-bevel-inset"
                data-i18n-placeholder="auth.emailRegPlaceholder"
                placeholder="Correo"
              />
              <input
                type="text"
                id="regUsername"
                class="form-input retro-bevel-inset"
                data-i18n-placeholder="auth.usernamePlaceholder"
                placeholder="Nombre"
              />
              <input
                type="password"
                id="regPassword"
                class="form-input retro-bevel-inset"
                data-i18n-placeholder="auth.passRegPlaceholder"
                placeholder="Contraseña"
              />
              <p
                id="regError"
                style="color: red; font-size: 12px; display: none"
              ></p>
              <button
                class="form-button retro-bevel"
                onclick="registro()"
                data-i18n="auth.registerBtn"
              >
                Registrarse
              </button>
              <button
                class="switch-form-btn"
                onclick="switchForm('login')"
                data-i18n="auth.loginLink"
              >
                ¿Ya tienes cuenta?
              </button>
            </div>

            <div
              id="sessionPanel"
              style="display: none; padding: 16px; text-align: center"
            >
              <p
                id="sessionUsername"
                style="font-weight: bold; margin-bottom: 12px"
              ></p>
              <button
                class="form-button retro-bevel"
                onclick="logout()"
                data-i18n="auth.logout"
              >
                Cerrar sesión
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="achi-section">
        <div class="achi-panel retro-bevel-static">
          <div class="achi-header retro-bevel-inset">
            <h2 data-i18n="achievements.title">ACHIEVEMENTS</h2>
          </div>
          <div class="achi-container" id="achiContainer"></div>
        </div>
      </section>
    </main>

    <script src="./js/navegacion.js"></script>
    <script src="./js/login.js"></script>
    <script src="./js/i18n.js"></script>
    <script>
      requiereLogin();

      const usuarioInicial = getUsuario();
      if (usuarioInicial?.temaEquipado) {
        document.getElementById("theme-stylesheet").href =
          `./css/${usuarioInicial.temaEquipado}`;
      }

      async function cargarLogros() {
        const container = document.getElementById("achiContainer");
        container.innerHTML = `<p style="padding:16px">${t("achievements.loading")}</p>`;

        const usuario = getUsuario();

        const resLogros = await fetch("/api/logros");
        const logros = await resLogros.json();

        const resUL = await fetch(`/api/usuario-logros/jugador/${usuario.id}`);
        const usuarioLogros = await resUL.json();

        const logroIds = new Set(usuarioLogros.map((ul) => ul.logroId));

        container.innerHTML = "";

        logros.forEach((logro) => {
          const obtenido = logroIds.has(logro.id);
          const item = document.createElement("div");
          item.className = `achievement-item retro-bevel-static${obtenido ? " unlocked" : ""}`;

          item.innerHTML = `
        <div class="achi-content">
            <div class="achi-title">${t("logros." + logro.nombre + ".nombre")}</div>
            <div class="achi-description">${t("logros." + logro.nombre + ".desc")}</div>
        </div>
        <div class="achi-points">${logro.puntos} pts</div>
        <div class="achi-status">${obtenido ? t("achievements.unlocked") : t("achievements.locked")}</div>
    `;
          container.appendChild(item);
        });
      }

      window.addEventListener("DOMContentLoaded", async () => {
        await esperarTraducciones();
        cargarLogros();
      });
    </script>
  </body>
</html>
