<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MINESWEEPER</title>
    <link rel="icon" type="image/png" href="./img/mine.png" />
    <link
      id="theme-stylesheet"
      rel="stylesheet"
      href="./css/theme-classic.css"
    />
  </head>
  <body>
    <header>
      <div class="dropdown-container">
        <div
          class="menu-btn retro-bevel"
          onclick="toggleDropdown('menuDropdown')"
        >
          <div class="hamburger-icon">
            <div class="hamburger-line"></div>
            <div class="hamburger-line"></div>
            <div class="hamburger-line"></div>
          </div>
          <span class="menu-text">Menu</span>
        </div>
        <div id="menuDropdown" class="dropdown-content menu-dropdown">
          <div class="menu-option retro-bevel">
            <a href="minesweeper.html" data-i18n="menu.game">Game</a>
          </div>
          <div class="menu-option retro-bevel">
            <a href="achievements.html" data-i18n="menu.achievements"
              >Achievements</a
            >
          </div>
          <div class="menu-option retro-bevel">
            <a href="usuario.html" data-i18n="menu.user">User</a>
          </div>
          <div class="menu-option retro-bevel">
            <a href="shop.html" data-i18n="menu.shop">Shop</a>
          </div>
          <div class="menu-option retro-bevel">
            <a href="historial.html" data-i18n="menu.history">History</a>
          </div>
        </div>
      </div>

      <div class="title-section">
        <h1>MINESWEEPER</h1>
        <img src="img/mine.png" alt="" />
      </div>

      <div class="header-right">
        <div class="header-btn retro-bevel" onclick="cambiarIdioma()">
          <img src="img/unionjack.webp" alt="" id="langFlag" />
          <span class="btn-text" id="langText" data-i18n="header.language"
            >English</span
          >
        </div>

        <div class="dropdown-container">
          <div
            class="header-btn retro-bevel"
            onclick="toggleDropdown('loginDropdown')"
          >
            <img src="img/face.webp" alt="" />
            <span id="loginBtnText" class="btn-text" data-i18n="header.login"
              >Login</span
            >
          </div>
          <div id="loginDropdown" class="dropdown-content login-dropdown">
            <div class="login-form active" id="loginForm">
              <h3
                style="text-align: center; margin-bottom: 15px; font-size: 14px"
                data-i18n="auth.loginTitle"
              >
                LOGIN
              </h3>
              <input
                type="email"
                id="loginEmail"
                class="form-input retro-bevel-inset"
                data-i18n-placeholder="auth.emailPlaceholder"
                placeholder="Email"
              />
              <input
                type="password"
                id="loginPassword"
                class="form-input retro-bevel-inset"
                data-i18n-placeholder="auth.passwordPlaceholder"
                placeholder="Password"
              />
              <p
                id="loginError"
                style="color: red; font-size: 12px; display: none"
              ></p>
              <button
                class="form-button retro-bevel"
                onclick="login()"
                data-i18n="auth.loginBtn"
              >
                Log in
              </button>
              <button
                class="switch-form-btn"
                onclick="switchForm('register')"
                data-i18n="auth.signupLink"
              >
                Sign up
              </button>
            </div>

            <div class="register-form" id="registerForm">
              <h3
                style="text-align: center; margin-bottom: 15px; font-size: 14px"
                data-i18n="auth.registerTitle"
              >
                Sign in
              </h3>
              <input
                type="email"
                id="regEmail"
                class="form-input retro-bevel-inset"
                data-i18n-placeholder="auth.emailRegPlaceholder"
                placeholder="Correo"
              />
              <input
                type="text"
                id="regUsername"
                class="form-input retro-bevel-inset"
                data-i18n-placeholder="auth.usernamePlaceholder"
                placeholder="Nombre"
              />
              <input
                type="password"
                id="regPassword"
                class="form-input retro-bevel-inset"
                data-i18n-placeholder="auth.passRegPlaceholder"
                placeholder="Contraseña"
              />
              <p
                id="regError"
                style="color: red; font-size: 12px; display: none"
              ></p>
              <button
                class="form-button retro-bevel"
                onclick="registro()"
                data-i18n="auth.registerBtn"
              >
                Registrarse
              </button>
              <button
                class="switch-form-btn"
                onclick="switchForm('login')"
                data-i18n="auth.loginLink"
              >
                ¿Ya tienes cuenta?
              </button>
            </div>

            <div
              id="sessionPanel"
              style="display: none; padding: 16px; text-align: center"
            >
              <p
                id="sessionUsername"
                style="font-weight: bold; margin-bottom: 12px"
              ></p>
              <button
                class="form-button retro-bevel"
                onclick="logout()"
                data-i18n="auth.logout"
              >
                Cerrar sesión
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="usr-section">
        <div class="usr-panel retro-bevel-static">
          <div class="usr-header retro-bevel-inset">
            <h2 data-i18n="user.title">USER PROFILE</h2>
            <div class="usr-header-info">
              <div class="usr-meta">
                <span class="usr-name-display" id="usrNameDisplay"></span>
                <span class="usr-joined" id="usrJoined" data-i18n="user.joined"
                  >JOINED: </span
                ><span class="usr-joined" id="joinedDate"></span>
              </div>
            </div>
          </div>

          <div class="usr-body">
            <!-- Panel 1: Cambiar nombre -->
            <div class="usr-card retro-bevel-inset">
              <div
                class="usr-card-title retro-bevel"
                data-i18n="user.changeUsername"
              >
                CHANGE USERNAME
              </div>
              <div class="usr-card-content">
                <label class="usr-label" data-i18n="user.currentUsername"
                  >CURRENT USERNAME</label
                >
                <div
                  class="usr-field-readonly retro-bevel-inset"
                  id="currentName"
                ></div>

                <label class="usr-label" data-i18n="user.newUsername"
                  >NEW USERNAME</label
                >
                <input
                  type="text"
                  class="usr-input retro-bevel-inset"
                  id="newUsername"
                  data-i18n-placeholder="user.newUsernamePlaceholder"
                  placeholder="Enter new username"
                  maxlength="20"
                />

                <button
                  class="usr-btn usr-btn--primary retro-bevel"
                  onclick="changeUsername()"
                  data-i18n="user.saveUsername"
                >
                  SAVE USERNAME
                </button>
              </div>
            </div>

            <!-- Panel 2: Cambiar contraseña -->
            <div class="usr-card retro-bevel-inset">
              <div
                class="usr-card-title retro-bevel"
                data-i18n="user.changePassword"
              >
                CHANGE PASSWORD
              </div>
              <div class="usr-card-content">
                <label class="usr-label" data-i18n="user.currentPassword"
                  >CURRENT PASSWORD</label
                >
                <input
                  type="password"
                  class="usr-input retro-bevel-inset"
                  id="currentPassword"
                  data-i18n-placeholder="user.currentPassPlaceholder"
                  placeholder="Current password"
                />

                <label class="usr-label" data-i18n="user.newPassword"
                  >NEW PASSWORD</label
                >
                <input
                  type="password"
                  class="usr-input retro-bevel-inset"
                  id="newPassword"
                  data-i18n-placeholder="user.newPassPlaceholder"
                  placeholder="New password"
                />

                <label class="usr-label" data-i18n="user.confirmPassword"
                  >CONFIRM NEW PASSWORD</label
                >
                <input
                  type="password"
                  class="usr-input retro-bevel-inset"
                  id="confirmPassword"
                  data-i18n-placeholder="user.confirmPassPlaceholder"
                  placeholder="Repeat new password"
                />

                <button
                  class="usr-btn usr-btn--primary retro-bevel"
                  onclick="changePassword()"
                  data-i18n="user.savePassword"
                >
                  SAVE PASSWORD
                </button>
              </div>
            </div>

            <!-- Panel 3: Eliminar cuenta -->
            <div class="usr-card usr-card--danger retro-bevel-inset">
              <div
                class="usr-card-title usr-card-title--danger retro-bevel"
                data-i18n="user.deleteAccount"
              >
                DELETE ACCOUNT
              </div>
              <div class="usr-card-content">
                <div class="usr-danger-warning retro-bevel-inset">
                  <p class="usr-warning-text" data-i18n="user.deleteWarning">
                    This action is permanent and cannot be undone.
                  </p>
                </div>

                <label class="usr-label" data-i18n="user.confirmYourPass"
                  >CONFIRM YOUR PASSWORD</label
                >
                <input
                  type="password"
                  class="usr-input retro-bevel-inset"
                  id="deletePassword"
                  data-i18n-placeholder="user.confirmPassPlaceholder2"
                  placeholder="Enter password to confirm"
                />

                <label class="usr-label" data-i18n="user.typeDelete"
                  >TYPE "DELETE" TO CONFIRM</label
                >
                <input
                  type="text"
                  class="usr-input retro-bevel-inset"
                  id="deleteConfirmText"
                  data-i18n-placeholder="user.typeDeletePlaceholder"
                  placeholder="Type DELETE"
                  maxlength="6"
                />

                <button
                  class="usr-btn usr-btn--danger retro-bevel"
                  onclick="deleteAccount()"
                  data-i18n="user.deleteBtn"
                >
                  DELETE ACCOUNT
                </button>
              </div>
            </div>
          </div>

          <div class="usr-toast retro-bevel" id="usrToast"></div>
        </div>
      </section>
    </main>

    <script src="./js/navegacion.js"></script>
    <script src="./js/login.js"></script>
    <script src="./js/i18n.js"></script>
    <script>
      requiereLogin();

      const usuarioInicial = getUsuario();
      if (usuarioInicial?.temaEquipado) {
        document.getElementById("theme-stylesheet").href =
          `./css/${usuarioInicial.temaEquipado}`;
      }

      let toastTimer = null;
      function showToast(msg, type = "ok") {
        const t_el = document.getElementById("usrToast");
        t_el.textContent = msg;
        t_el.className = `usr-toast retro-bevel usr-toast--${type} usr-toast--visible`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(
          () => t_el.classList.remove("usr-toast--visible"),
          3000,
        );
      }

      async function changeUsername() {
        const usuario = getUsuario();
        const nuevoUsername = document
          .getElementById("newUsername")
          .value.trim();

        if (!nuevoUsername) {
          showToast(t("errors.fillAllFields"), "err");
          return;
        }

        const res = await fetch(`/api/usuarios/${usuario.id}/username`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: nuevoUsername }),
        });
        const datos = await res.json();

        if (!res.ok) {
          showToast(tError(datos.error).toUpperCase(), "err");
          return;
        }

        sessionStorage.setItem("usuario", JSON.stringify(datos));
        actualizarHeaderUsuario(datos);

        document.getElementById("usrNameDisplay").textContent = datos.username;
        document.getElementById("currentName").textContent = datos.username;
        document.getElementById("newUsername").value = "";
        showToast(t("user.usernameUpdated"), "ok");
      }

      async function changePassword() {
        const usuario = getUsuario();
        const passwordActual = document.getElementById("currentPassword").value;
        const passwordNueva = document.getElementById("newPassword").value;
        const confirmar = document.getElementById("confirmPassword").value;

        if (!passwordActual) {
          showToast(t("errors.enterCurrentPass"), "err");
          return;
        }
        if (passwordNueva !== confirmar) {
          showToast(t("errors.passwordsNoMatch"), "err");
          return;
        }

        const res = await fetch(`/api/usuarios/${usuario.id}/password`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ passwordActual, passwordNueva }),
        });
        const datos = await res.json();

        if (!res.ok) {
          showToast(tError(datos.error).toUpperCase(), "err");
          return;
        }

        document.getElementById("currentPassword").value = "";
        document.getElementById("newPassword").value = "";
        document.getElementById("confirmPassword").value = "";
        showToast(t("user.passwordUpdated"), "ok");
      }

      async function deleteAccount() {
        const usuario = getUsuario();
        const password = document.getElementById("deletePassword").value;
        const confirm = document
          .getElementById("deleteConfirmText")
          .value.trim()
          .toUpperCase();

        if (!password) {
          showToast(t("errors.enterPassword"), "err");
          return;
        }
        if (confirm !== "DELETE") {
          showToast(t("errors.typeDeleteConfirm"), "err");
          return;
        }

        const res = await fetch(`/api/usuarios/${usuario.id}`, {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });
        const datos = await res.json();

        if (!res.ok) {
          showToast(tError(datos.error).toUpperCase(), "err");
          return;
        }

        showToast(t("user.accountDeleted"), "err");
        setTimeout(() => {
          sessionStorage.removeItem("usuario");
          window.location.href = "minesweeper.html";
        }, 2500);
      }

      window.addEventListener("DOMContentLoaded", async () => {
        await esperarTraducciones();
        const usuario = getUsuario();
        document.getElementById("usrNameDisplay").textContent =
          usuario.username;
        document.getElementById("currentName").textContent = usuario.username;
        if (usuario.createdAt) {
          document.getElementById("usrJoined").textContent = t("user.joined");

          document.getElementById("joinedDate").textContent = new Date(
            usuario.createdAt,
          ).toLocaleDateString("es-ES");
        }
      });
    </script>
  </body>
</html>
